# Whole-stack compose: platform infra + application services.
# All containers join the `backend_platform` network so they can reach each
# other by service name.

name: backend

# ---------------------------------------------------------------------------
# YAML anchors — share defaults across services so onboarding a new service
# is one block, not 30 lines of boilerplate.
# ---------------------------------------------------------------------------

# OpenTelemetry env shared by every app service.
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "none"
  OTEL_PROPAGATORS: "tracecontext,baggage"

x-node-otel-env: &node-otel-env
  <<: *otel-env
  NODE_OPTIONS: "--require @opentelemetry/auto-instrumentations-node/register"

# Default restart + resource budget for long-running services. Compose v2
# reads `deploy.resources.limits` even outside Swarm.
x-app-defaults: &app-defaults
  restart: unless-stopped
  deploy:
    resources:
      limits: { cpus: "0.75", memory: "512M" }
      reservations: { cpus: "0.1", memory: "128M" }

# Smaller budget for platform services that mostly idle.
x-platform-defaults: &platform-defaults
  restart: unless-stopped
  deploy:
    resources:
      limits: { cpus: "1.0", memory: "1G" }
      reservations: { cpus: "0.1", memory: "128M" }

networks:
  backend_platform:
    name: ${PLATFORM_NETWORK:-backend_platform}
    driver: bridge

volumes:
  kafka_data:
  redis_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  loki_data:
  postgres_auth_data:
  postgres_agents_data:
  postgres_projects_data:
  qdrant_data:
  ai_agents_files:
  caddy_data:
  caddy_config:
  neo4j_data:

services:
  # ============================================================
  # Edge: TLS termination + single public entry point
  # ============================================================
  # Caddy auto-generates a self-signed cert for local development.
  # The frontend talks HTTPS to https://localhost:${CADDY_HTTPS_PORT}.
  caddy:
    image: caddy:2.8-alpine
    container_name: caddy
    networks: [backend_platform]
    ports:
      - "${CADDY_HTTPS_PORT:-8443}:443"
      - "${CADDY_HTTP_PORT:-8888}:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      gateway: { condition: service_started }
    <<: *platform-defaults

  # ============================================================
  # Platform: messaging + cache
  # ============================================================
  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    networks: [backend_platform]
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    <<: *platform-defaults

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [backend_platform]
    depends_on: [kafka]
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    <<: *platform-defaults

  # One-shot init: declares topics + DLQs, then exits 0.
  # Replication is env-driven so the prod overlay can raise it without
  # forking this block: dev defaults to rf=1 / min-ISR=1 (single broker);
  # docker-compose.prod.yml sets 3 / 2. The custom entrypoint bypasses the
  # image's KAFKA_* env-to-server-properties translation, so these are
  # plain shell vars here. (contracts/topics.json's replicationFactor is
  # documentation — nothing reads it at runtime; this env is the source
  # of truth per environment.)
  kafka-init:
    image: apache/kafka:3.7.1
    container_name: kafka-init
    networks: [backend_platform]
    depends_on:
      kafka: { condition: service_healthy }
    environment:
      KAFKA_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-1}
      KAFKA_MIN_INSYNC_REPLICAS: ${KAFKA_MIN_INSYNC_REPLICAS:-1}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        RF="$${KAFKA_REPLICATION_FACTOR:-1}"
        MIN_ISR="$${KAFKA_MIN_INSYNC_REPLICAS:-1}"
        echo "Creating topics (replication-factor=$$RF, min.insync.replicas=$$MIN_ISR)..."
        for topic in auth.events.v1 agents.events.v1 auth.events.v1.dlq agents.events.v1.dlq; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
            --topic "$$topic" --partitions 3 --replication-factor "$$RF" \
            --config min.insync.replicas="$$MIN_ISR"
        done
        echo "Topics ready:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: redis
    networks: [backend_platform]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *platform-defaults

  # ============================================================
  # Platform: per-service Postgres
  # ============================================================
  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    networks: [backend_platform]
    ports:
      - "${AUTH_DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${AUTH_DB_USER:-auth}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth}
      POSTGRES_DB: ${AUTH_DB_NAME:-auth}
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-auth} -d ${AUTH_DB_NAME:-auth}"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *platform-defaults

  postgres-agents:
    image: postgres:16-alpine
    container_name: postgres-agents
    networks: [backend_platform]
    ports:
      - "${AGENTS_DB_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: ${AGENTS_DB_USER:-agents}
      POSTGRES_PASSWORD: ${AGENTS_DB_PASSWORD:-agents}
      POSTGRES_DB: ${AGENTS_DB_NAME:-agents}
    volumes:
      - postgres_agents_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AGENTS_DB_USER:-agents} -d ${AGENTS_DB_NAME:-agents}"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *platform-defaults

  # ============================================================
  # Platform: vector store (Qdrant)
  # ============================================================
  # Single-collection setup; per-user isolation is via payload filter
  # on `owner_id` (see QdrantVectorStore). Volume persists collection
  # data across container restarts. Healthcheck uses the readiness
  # endpoint Qdrant exposes on the REST port.
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: qdrant
    networks: [backend_platform]
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *platform-defaults

  # ============================================================
  # Platform: observability — traces, metrics, logs, dashboards
  # ============================================================
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    networks: [backend_platform]
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    <<: *platform-defaults

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: otel-collector
    networks: [backend_platform]
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
      - "8889:8889"
    depends_on: [jaeger]
    <<: *platform-defaults

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    networks: [backend_platform]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on: [alertmanager]
    <<: *platform-defaults

  # Receives fired alerts from Prometheus; groups, dedupes, and delivers
  # them. Local config ships a placeholder webhook receiver — swap in
  # Slack/PagerDuty for production (see alertmanager/alertmanager.yml).
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    networks: [backend_platform]
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *platform-defaults

  # Centralized log store. Promtail tails Docker container stdout/stderr
  # and ships it here; Grafana queries Loki the same way it queries
  # Prometheus.
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    networks: [backend_platform]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    <<: *platform-defaults

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    networks: [backend_platform]
    volumes:
      - ./loki/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yaml"]
    depends_on: [loki]
    <<: *platform-defaults

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    networks: [backend_platform]
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus, loki]
    <<: *platform-defaults

  # ============================================================
  # Applications
  # ============================================================
  auth-service:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    container_name: auth-service
    networks: [backend_platform]
    environment:
      <<: *node-otel-env
      OTEL_SERVICE_NAME: auth-service
      # Local stack runs plain HTTP behind Caddy → keep cookie non-Secure.
      # In prod set to "production".
      NODE_ENV: development
      PORT: ${AUTH_PORT:-3001}
      DATABASE_URL: ${AUTH_DATABASE_URL}
      REDIS_URL: ${REDIS_URL_INTERNAL}
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS}
      SESSION_SECRET: ${SESSION_SECRET}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
    depends_on:
      postgres-auth: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
    <<: *app-defaults

  ai-agents-service:
    build:
      context: ../services/ai-agents
      dockerfile: Dockerfile
    container_name: ai-agents-service
    networks: [backend_platform]
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: ai-agents-service
      PORT: ${AGENTS_PORT:-8000}
      DATABASE_URL: ${AGENTS_DATABASE_URL}
      REDIS_URL: ${REDIS_URL_INTERNAL}
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL}
      # LiteLLM proxy is the active model provider (OpenAI-compatible).
      LITELLM_PROXY_API_BASE: ${LITELLM_PROXY_API_BASE}
      LITELLM_PROXY_API_KEY: ${LITELLM_PROXY_API_KEY}
      LITELLM_MODEL: ${LITELLM_MODEL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      # Direct-provider keys kept for future code paths but unused by the
      # active agent (which routes through the LiteLLM proxy above).
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      KAFKA_MAX_HANDLER_ATTEMPTS: ${KAFKA_MAX_HANDLER_ATTEMPTS:-3}
      # Vector store (Qdrant) — single shared collection, per-user
      # isolation enforced via owner_id payload filter inside the
      # adapter. The embedding model must match the vector size below:
      # `text-embedding-3-small` is 1536 dims, the platform default.
      VECTOR_STORE_BACKEND: ${VECTOR_STORE_BACKEND:-qdrant}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-praxis_knowledge}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE:-1536}
      # LangSmith tracing — LangChain / LangGraph picks these up
      # directly from process env (no app wiring needed). Traces go
      # to the `praxis` project at smith.langchain.com. Leave the key
      # blank in dev to disable; tracing only activates when V2=true
      # AND a non-empty API key is present.
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-praxis}
      # Pin the local-storage dir to the volume mount below so
      # uploaded file bytes survive container restarts. Default in
      # env.py is /tmp/praxis-files which gets wiped every restart —
      # metadata (in Postgres) would survive but bytes wouldn't, so
      # `GET /files/{id}/content` would 404 after every redeploy.
      FILES_LOCAL_DIR: /var/lib/praxis/files
    volumes:
      - ai_agents_files:/var/lib/praxis/files
    depends_on:
      postgres-agents: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
      qdrant: { condition: service_healthy }
    <<: *app-defaults

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: gateway
    networks: [backend_platform]
    ports:
      - "${GATEWAY_PORT:-4000}:3000"
    environment:
      <<: *node-otel-env
      OTEL_SERVICE_NAME: gateway
      NODE_ENV: development
      PORT: 3000
      PUBLIC_ORIGIN: ${GATEWAY_PUBLIC_ORIGIN}
      # CORS allow-list: comma-separated origins. CORS code splits and trims.
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS}
      REDIS_URL: ${REDIS_URL_INTERNAL}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME}
      SESSION_SECRET: ${SESSION_SECRET}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      AI_AGENTS_SERVICE_URL: ${AI_AGENTS_SERVICE_URL}
      MEMORY_SERVICE_URL: ${MEMORY_SERVICE_URL:-http://memory-service:8001}
      PROJECTS_SERVICE_URL: ${PROJECTS_SERVICE_URL:-http://projects-service:8003}
      SANDBOX_SERVICE_URL: ${SANDBOX_SERVICE_URL:-http://sandbox-service:8004}
      # Resilience
      PROXY_CB_THRESHOLD: ${PROXY_CB_THRESHOLD:-5}
      PROXY_CB_RESET_MS: ${PROXY_CB_RESET_MS:-15000}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
    depends_on:
      redis: { condition: service_healthy }
      auth-service: { condition: service_started }
      ai-agents-service: { condition: service_started }
      memory-service: { condition: service_started }
      projects-service: { condition: service_started }
      sandbox-service: { condition: service_started }
    <<: *app-defaults

  # ============================================================
  # Memory service: Graphiti + Neo4j + Qdrant, MCP + REST
  # ============================================================
  neo4j:
    image: neo4j:5
    container_name: neo4j
    networks: [backend_platform]
    ports:
      - "${NEO4J_HTTP_PORT:-7475}:7474"
      - "${NEO4J_BOLT_PORT:-7688}:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-changeme} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    <<: *platform-defaults

  memory-service:
    build:
      context: ../services/memory
      dockerfile: Dockerfile
    container_name: memory-service
    networks: [backend_platform]
    ports:
      - "${MEMORY_PORT:-8001}:8001"
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: memory-service
      PORT: ${MEMORY_PORT:-8001}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      LITELLM_PROXY_API_BASE: ${LITELLM_PROXY_API_BASE}
      LITELLM_PROXY_API_KEY: ${LITELLM_PROXY_API_KEY}
      GRAPHITI_LLM_MODEL: ${GRAPHITI_LLM_MODEL:-gpt-4.1-mini}
      GRAPHITI_LLM_SMALL_MODEL: ${GRAPHITI_LLM_SMALL_MODEL:-gpt-4.1-nano}
      GRAPHITI_LLM_TEMPERATURE: ${GRAPHITI_LLM_TEMPERATURE:-0}
      EMBEDDING_MODEL: ${GRAPHITI_EMBEDDING_MODEL:-text-embedding-3-large-skillsify}
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL}
      KAFKA_MAX_HANDLER_ATTEMPTS: ${KAFKA_MAX_HANDLER_ATTEMPTS:-3}
    depends_on:
      neo4j: { condition: service_healthy }
      qdrant: { condition: service_healthy }
      kafka: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
    <<: *app-defaults

  # ============================================================
  # Projects service: persists project metadata + credentials
  # ============================================================
  projects-service:
    build:
      context: ../services/projects
      dockerfile: Dockerfile
    container_name: projects-service
    networks: [backend_platform]
    ports:
      - "${PROJECTS_PORT:-8003}:8003"
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: projects-service
      DATABASE_URL: ${PROJECTS_DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres-projects:5432/praxis_projects}
      ENCRYPTION_KEY: ${PROJECTS_ENCRYPTION_KEY:-JcqTQRXfEG47JRv6Vwjol5BPQXpa4z_-IZF6BPw-t9Q=}
      CORS_ORIGINS: '${PROJECTS_CORS_ORIGINS:-["*"]}'
    depends_on:
      postgres-projects: { condition: service_healthy }
    <<: *app-defaults

  postgres-projects:
    image: postgres:16-alpine
    container_name: postgres-projects
    networks: [backend_platform]
    ports:
      - "${PROJECTS_DB_PORT:-5435}:5432"
    environment:
      POSTGRES_USER: ${PROJECTS_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${PROJECTS_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${PROJECTS_DB_NAME:-praxis_projects}
    volumes:
      - postgres_projects_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROJECTS_DB_USER:-postgres} -d ${PROJECTS_DB_NAME:-praxis_projects}"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *platform-defaults

  # ============================================================
  # Sandbox service: E2B-backed project execution environments
  # ============================================================
  # Builds the local sandbox desktop base image and exits (kafka-init
  # pattern). sandbox-service launches sandbox containers FROM this image,
  # so it must exist on the daemon before the first `create`.
  sandbox-desktop-image:
    build:
      context: ../services/sandbox
      dockerfile: desktop.Dockerfile
    image: praxis-sandbox-desktop:local
    command: ["true"]
    restart: "no"
    networks: [backend_platform]

  sandbox-service:
    build:
      context: ../services/sandbox
      dockerfile: Dockerfile
    container_name: sandbox-service
    networks: [backend_platform]
    ports:
      - "${SANDBOX_PORT:-8004}:8004"
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: sandbox-service
      # Sandbox backend. "local" (default) runs each sandbox as a Docker
      # container on the host daemon — no account/key needed. Set to "e2b"
      # (plus E2B_API_KEY) to use E2B cloud desktop sandboxes instead.
      SANDBOX_PROVIDER: ${SANDBOX_PROVIDER:-local}
      LOCAL_SANDBOX_IMAGE: ${LOCAL_SANDBOX_IMAGE:-praxis-sandbox-desktop:local}
      # "" = default runc. Set to "sysbox-runc" (once Sysbox is installed on
      # the host) to give each sandbox unprivileged nested-Docker capability.
      SANDBOX_RUNTIME: ${SANDBOX_RUNTIME:-}
      E2B_API_KEY: ${E2B_API_KEY:-}
      # Per-sandbox resource caps (local provider): memory in MB, CPUs as a
      # float, and a pids ceiling (fork-bomb guard). 0 disables a cap.
      SANDBOX_MEMORY_MB: ${SANDBOX_MEMORY_MB:-2048}
      SANDBOX_CPUS: ${SANDBOX_CPUS:-2.0}
      SANDBOX_PIDS_LIMIT: ${SANDBOX_PIDS_LIMIT:-512}
      CORS_ORIGINS: '${SANDBOX_CORS_ORIGINS:-["*"]}'
    # LOCAL provider only: the service talks to the host Docker daemon via the
    # mounted socket. group_add grants the unprivileged app user (UID 1000)
    # supplementary membership of the socket's group so it can write to the
    # socket without running as root. On Docker Desktop for Windows the socket
    # is always owned by root:root (GID 0); on native Linux it's typically the
    # docker group (GID 999). Override DOCKER_GID if yours differs.
    group_add:
      - "${DOCKER_GID:-0}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      sandbox-desktop-image:
        condition: service_completed_successfully
    <<: *app-defaults
