global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: backend

# Alert rules (mounted next to this file by docker-compose).
rule_files:
  - /etc/prometheus/alerts.yml

# Fired alerts are pushed to Alertmanager, which handles grouping,
# silencing, and delivery (see infra/alertmanager/alertmanager.yml).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # All service metrics arrive here. Each service ships OTLP to the
  # OpenTelemetry Collector; the collector re-exposes everything as a
  # Prometheus endpoint at :8889. The `service_name` resource attribute
  # becomes a `service_name` label, so Grafana can filter per service.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
