# Updates the draft release on every merge to `main`. Reads config
# from `.github/release-drafter.yml`.
#
# `pull_request` trigger is intentionally OMITTED: release-drafter
# reads its config from the default branch only — it cannot see a
# config file that lives on a feature branch. Including the trigger
# would make every PR run fail with "config not found" until the
# config eventually lands on `main`. PR-label re-categorisation is
# the only feature lost; the draft still updates the moment a PR
# merges with its final labels attached.

name: release-drafter

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write       # to create / update the draft release
      pull-requests: write  # to read labels + write back metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
