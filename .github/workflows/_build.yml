# Reusable build+push workflow. Builds a service's Docker image and
# (optionally) pushes it to GHCR.
#
# Caller controls `push` so PRs build-without-push and `main` pushes.
# Tests run INSIDE the Dockerfile so a failing test aborts the build —
# we never publish an image that wouldn't pass its own tests.

name: build

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Logical name; becomes the image's tail segment"
      context:
        required: true
        type: string
        description: "Docker build context (path to the service)"
      push:
        required: false
        type: boolean
        default: false
        description: "Push to GHCR (only set true on main)"
      image-prefix:
        required: false
        type: string
        default: "ghcr.io/${{ github.repository }}/backend"

jobs:
  build:
    name: "build ${{ inputs.service-name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-prefix }}/${{ inputs.service-name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build${{ inputs.push && ' & push' || '' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.service-name }}
          cache-to: type=gha,scope=${{ inputs.service-name }},mode=max
